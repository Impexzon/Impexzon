local_backend: true
backend:
  name: git-gateway
  branch: main
  site_url:  #Netlify
  proxy_url: http://localhost:8081/api/v1

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

publish_mode: editorial_workflow

collections:
  - name: "products"
    label: "Products"
    folder: "_products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Full Description", name: "body", widget: "markdown" }
      - { label: "Price", name: "price", widget: "number", value_type: "float" }
      - { label: "Original Price", name: "original_price", widget: "number", value_type: "float", required: false }
      - { label: "Offer/Discount", name: "offer", widget: "string", required: false }
      - { label: "Featured Product", name: "featured", widget: "boolean", default: false }
      - { label: "Main Image", name: "image", widget: "image" }
      - label: "Gallery Images"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Alt Text", name: "alt", widget: "string", required: false }
      - label: "Product Specifications"
        name: "specifications"
        widget: "object"
        fields:
          - { label: "Net Weight", name: "net_weight", widget: "string" }
          - { label: "Ingredients", name: "ingredients", widget: "text" }
          - { label: "Shelf Life", name: "shelf_life", widget: "string" }
          - { label: "Allergen Info", name: "allergen_info", widget: "string", required: false }
          - { label: "Nutritional Info", name: "nutritional_info", widget: "text", required: false }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
