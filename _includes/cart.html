<style>
    /* CART DRAWER OVERLAY */
    .cart-drawer-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 100003; /* Higher than modal overlay (100002) */
        justify-content: flex-end;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .cart-drawer-overlay.show {
        display: flex;
        opacity: 1;
    }

    /* CART DRAWER */
    .cart-drawer {
        width: 350px;
        max-width: 100%;
        height: 100vh;
        background-color: #fff;
        box-shadow: -4px 0 20px rgba(0,0,0,0.15);
        transform: translateX(100%);
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
    }

    .cart-drawer-overlay.show .cart-drawer {
        transform: translateX(0);
    }

    .cart-drawer-header {
        padding: 20px;
        border-bottom: 1px solid #e9e9e9;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .cart-drawer-header h3 {
        margin: 0;
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        color: #0c0806;
    }

    .close-cart-drawer {
        font-size: 1.8rem;
        cursor: pointer;
        color: #666;
        background: none;
        border: none;
        line-height: 1;
    }

    .close-cart-drawer:hover {
        color: #0c0806;
    }

    .cart-drawer-items {
        flex-grow: 1;
        overflow-y: auto;
        padding: 20px;
    }

    .cart-empty-msg {
        text-align: center;
        color: #888;
        margin-top: 40px;
        font-size: 0.95rem;
    }

    /* CART ITEM */
    .cart-item {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid #FAF4F0;
        position: relative;
        text-align: left;
    }

    .cart-item img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 4px;
        border: 1px solid #e9e9e9;
    }

    .cart-item-info {
        flex-grow: 1;
    }

    .cart-item-info h4 {
        margin: 0 0 5px;
        font-family: 'Playfair Display', serif;
        font-size: 1rem;
        color: #0c0806;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 180px;
    }

    .cart-item-price {
        margin: 0 0 8px;
        font-size: 0.9rem;
        color: green;
        font-weight: 600;
    }

    .cart-item-qty {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .cart-item-qty button {
        width: 22px;
        height: 22px;
        border: 1px solid #dcdcdc;
        background: #fff;
        cursor: pointer;
        border-radius: 2px;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
    }

    .cart-item-qty button:hover {
        background: #FAF4F0;
        border-color: #888;
    }

    .cart-item-qty span {
        font-size: 0.9rem;
        font-weight: 600;
        color: #0c0806;
    }

    .cart-item-remove {
        position: absolute;
        top: 0;
        right: 0;
        background: none;
        border: none;
        font-size: 1.3rem;
        color: #aaa;
        cursor: pointer;
        line-height: 1;
    }

    .cart-item-remove:hover {
        color: #c64836;
    }

    /* FOOTER / TOTAL */
    .cart-drawer-footer {
        padding: 20px;
        border-top: 1px solid #e9e9e9;
        background: #FAF4F0;
    }

    .cart-total-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .cart-total-section span:first-child {
        font-family: 'Montserrat', sans-serif;
        font-weight: 600;
        font-size: 1rem;
        text-transform: uppercase;
        color: #666;
    }

    .cart-total-section span:last-child {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 1.4rem;
        color: #0c0806;
    }

    .cart-checkout-btns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .cart-checkout-btns button {
        padding: 12px 10px;
        font-family: 'Montserrat', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        border: none;
        border-radius: 2px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: #fff;
        transition: background-color 0.25s;
    }

    .cart-telegram-btn {
        background-color: #0088cc;
    }

    .cart-telegram-btn:hover {
        background-color: #006699;
    }

    .cart-whatsapp-btn {
        background-color: #25d366;
    }

    .cart-whatsapp-btn:hover {
        background-color: #1ebe57;
    }

    .cart-checkout-btns button svg {
        fill: #fff;
    }

    /* CHECKOUT DETAILS MODAL STYLES (Enforces overlays to stay hidden on page load) */
    .inquiry-modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 100004; /* Higher than drawer */
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .inquiry-modal-overlay.show {
        display: flex;
        opacity: 1;
    }

    .inquiry-modal {
        background-color: #fff;
        padding: 30px;
        width: 90%;
        max-width: 500px;
        position: relative;
        border-radius: 4px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        transform: translateY(-20px);
        transition: transform 0.3s ease;
    }

    .inquiry-modal-overlay.show .inquiry-modal {
        transform: translateY(0);
    }

    .inquiry-modal h3 {
        margin-top: 0;
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.8rem;
        margin-bottom: 20px;
        color: #111;
    }

    .close-modal {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 1.5rem;
        cursor: pointer;
        color: #666;
        line-height: 1;
    }

    .close-modal:hover {
        color: #111;
    }

    .form-group {
        margin-bottom: 15px;
        text-align: left;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        color: #111;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #e9e9e9;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        border-radius: 2px;
        background-color: #fff;
    }

    .form-group input[readonly] {
        background-color: #f9f9f9;
        color: #666;
    }

    .form-submit-btn {
        width: 100%;
        background-color: #111;
        color: #fff;
        border: none;
        padding: 14px;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        cursor: pointer;
        margin-top: 10px;
        transition: background-color 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-submit-btn:hover {
        background-color: #666;
    }
</style>

<!-- CART CHECKOUT DETAILS MODAL -->
<div class="inquiry-modal-overlay" id="cartCheckoutModal" style="z-index: 100004;">
    <div class="inquiry-modal">
        <span class="close-modal" onclick="closeCheckoutModal()">&times;</span>
        <h3>Checkout Order</h3>
        <form id="cartCheckoutForm" onsubmit="submitCheckout(event)">
            <div class="form-group">
                <label for="checkoutName">Name</label>
                <input type="text" id="checkoutName" placeholder="Name" readonly>
            </div>
            <div class="form-group">
                <label for="checkoutEmail">Email</label>
                <input type="email" id="checkoutEmail" placeholder="Email" readonly>
            </div>
            <div class="form-group">
                <label for="checkoutPhone">Mobile Number</label>
                <input type="tel" id="checkoutPhone" required placeholder="Enter your mobile number">
            </div>
            <input type="hidden" id="checkoutChannel" value="telegram">
            <div class="inquiry-submit-options" style="display: grid; grid-template-columns: 1fr; margin-top: 15px;">
                <button type="submit" class="form-submit-btn" style="margin-top: 0; padding: 12px 10px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span>Submit & Send Order</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('impexzon_cart')) || [];

    function saveCart() {
        localStorage.setItem('impexzon_cart', JSON.stringify(cart));
        updateCartUI();
    }

    function addToCart(id, name, price, image) {
        const existing = cart.find(item => item.id === id);
        const numericPrice = Number(String(price).replace(/[^\d.]/g, '')) || 0;
        
        let cleanedImage = String(image || '').trim();
        if (cleanedImage && !cleanedImage.startsWith('http') && !cleanedImage.startsWith('/')) {
            cleanedImage = '/' + cleanedImage;
        }

        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({
                id: id,
                name: name,
                price: numericPrice,
                image: cleanedImage,
                quantity: 1
            });
        }
        saveCart();
        openCart();
    }

    function removeFromCart(id) {
        cart = cart.filter(item => item.id !== id);
        saveCart();
    }

    function updateQuantity(id, change) {
        const item = cart.find(item => item.id === id);
        if (item) {
            item.quantity += change;
            if (item.quantity <= 0) {
                removeFromCart(id);
            } else {
                saveCart();
            }
        }
    }

    function updateCartUI() {
        // 1. Update badges (in header cart icon and menu link)
        const badge = document.getElementById('cartBadge');
        const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        if (badge) {
            badge.textContent = totalCount;
            badge.style.display = totalCount > 0 ? 'flex' : 'none';
        }
        
        // Update navigation text badge if present
        const navCartBtn = document.getElementById('navCartBtn');
        if (navCartBtn) {
            navCartBtn.textContent = totalCount > 0 ? `CART (${totalCount})` : 'CART';
        }

        // 2. Render drawer items
        const container = document.getElementById('cartDrawerItems');
        if (!container) return;
        
        container.innerHTML = '';
        let totalSum = 0;
        
        if (cart.length === 0) {
            container.innerHTML = '<p class="cart-empty-msg">Your cart is empty.</p>';
        } else {
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                totalSum += itemTotal;
                
                const itemEl = document.createElement('div');
                itemEl.className = 'cart-item';
                itemEl.innerHTML = `
                    <img src="${window.siteBaseUrl || ''}${item.image}" alt="${item.name}">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p class="cart-item-price">$${item.price}</p>
                        <div class="cart-item-qty">
                            <button onclick="updateQuantity('${item.id}', -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity('${item.id}', 1)">+</button>
                        </div>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart('${item.id}')">&times;</button>
                `;
                container.appendChild(itemEl);
            });
        }
        
        // 3. Update sum
        const sumEl = document.getElementById('cartDrawerSum');
        if (sumEl) {
            sumEl.textContent = '$' + totalSum;
        }
    }

    function openCart() {
        const drawer = document.getElementById('cartDrawerOverlay');
        if (drawer) {
            drawer.classList.add('show');
        }
    }

    function closeCart() {
        const drawer = document.getElementById('cartDrawerOverlay');
        if (drawer) {
            drawer.classList.remove('show');
        }
    }

    // CHECKOUT FLOW TRIGGERS
    function checkoutCart(channel) {
        if (cart.length === 0) {
            alert("Your cart is empty.");
            return;
        }

        const auth = window.firebaseAuthInstance;
        if (!auth) {
            // Show a custom styled loading alert
            const loadingOverlay = document.createElement('div');
            loadingOverlay.className = 'auth-alert-modal-overlay show';
            loadingOverlay.id = 'tempAuthLoadingModal';
            loadingOverlay.innerHTML = `
                <div class="auth-alert-modal">
                    <span class="close-auth-modal" onclick="document.getElementById('tempAuthLoadingModal').remove()">&times;</span>
                    <div class="auth-alert-icon" style="color: #ffcc00; filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.4));">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                    </div>
                    <h3>System Initializing</h3>
                    <p>The authentication system is loading. Please try again in a moment.</p>
                </div>
            `;
            // Close on overlay click
            loadingOverlay.addEventListener('click', (e) => {
                if (e.target === loadingOverlay) {
                    loadingOverlay.remove();
                }
            });
            document.body.appendChild(loadingOverlay);
            setTimeout(() => {
                if (loadingOverlay.parentNode) {
                    loadingOverlay.remove();
                }
            }, 3000);
            return;
        }
        
        // 1. Enforce login
        if (!auth.currentUser) {
            if (typeof showAuthAlertModal === 'function') {
                showAuthAlertModal('checkout');
            } else {
                alert("Please sign in with Google to complete your checkout.");
            }
            return;
        }
        
        // 2. Set channel
        document.getElementById('checkoutChannel').value = channel;
        
        // 3. Prefill name & email
        document.getElementById('checkoutName').value = auth.currentUser.displayName || 'Guest User';
        document.getElementById('checkoutEmail').value = auth.currentUser.email || '';
        
        // 4. Close cart drawer and open checkout details modal
        closeCart();
        document.getElementById('cartCheckoutModal').classList.add('show');
    }

    function closeCheckoutModal() {
        document.getElementById('cartCheckoutModal').classList.remove('show');
    }

    function submitCheckout(event) {
        event.preventDefault();
        
        const channel = document.getElementById('checkoutChannel').value;
        const name = document.getElementById('checkoutName').value || "Not provided";
        const email = document.getElementById('checkoutEmail').value || "Not provided";
        const phone = document.getElementById('checkoutPhone').value;
        
        if (!phone) {
            alert("Mobile number is required.");
            return;
        }
        
        // Build cart items summary
        let itemsText = '';
        let totalSum = 0;
        
        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            totalSum += itemTotal;
            itemsText += `${index + 1}. *${item.name}* (Qty: ${item.quantity}) - $${itemTotal}\n`;
        });
        
        const text = `🛒 *New Order Request*\n\n` +
            `👤 *Customer Profile*\n` +
            `• *Name:* ${name}\n` +
            `• *Email:* ${email}\n` +
            `• *Phone:* ${phone}\n\n` +
            `📦 *Order Details*\n` +
            itemsText +
            `\n*Total Sum:* $${totalSum}\n\n` +
            `Please confirm my order.`;
            
        const encodedText = encodeURIComponent(text);
        
        if (channel === 'telegram') {
            const adminTelegramUsername = "{{ site.telegram_username | default: 'Rinshad_py' }}";
            const telegramUrl = `https://t.me/${adminTelegramUsername}?text=${encodedText}`;
            window.open(telegramUrl, '_blank');
        } else if (channel === 'whatsapp') {
            const adminWhatsAppNumber = "{{ site.whatsapp_number | default: '917684567345' }}"; 
            const whatsappUrl = `https://wa.me/${adminWhatsAppNumber}?text=${encodedText}`;
            window.open(whatsappUrl, '_blank');
        }
        
        closeCheckoutModal();
        // Optionally clear cart
        cart = [];
        saveCart();
    }

    // Initialize triggers
    document.addEventListener('DOMContentLoaded', () => {
        updateCartUI();
        
        const navCartBtn = document.getElementById('navCartBtn');
        const headerCartBtn = document.getElementById('headerCartBtn');
        const overlay = document.getElementById('cartDrawerOverlay');
        const checkoutOverlay = document.getElementById('cartCheckoutModal');
        
        if (navCartBtn) {
            navCartBtn.addEventListener('click', (e) => {
                e.preventDefault();
                openCart();
            });
        }
        
        if (headerCartBtn) {
            headerCartBtn.addEventListener('click', (e) => {
                e.preventDefault();
                openCart();
            });
        }

        // Close on clicking overlay backgrounds
        if (overlay) {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    closeCart();
                }
            });
        }
        if (checkoutOverlay) {
            checkoutOverlay.addEventListener('click', (e) => {
                if (e.target === checkoutOverlay) {
                    closeCheckoutModal();
                }
            });
        }

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeCart();
                closeCheckoutModal();
            }
        });
    });
</script>
