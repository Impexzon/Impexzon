<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <base href="/"> -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-eval' 'unsafe-inline' data: blob: https:; script-src 'self' 'unsafe-eval' 'unsafe-inline' data: blob: https:; style-src 'self' 'unsafe-inline' https:;">


    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">
    <script>window.siteBaseUrl = "{{ '' | relative_url }}";</script>

    <link rel="canonical" href="{{ site.url }}{{ page.url }}">

    <style>

    </style>
</head>
<body>
    {% include header.html %}
    
    <main class="page-content">
        <div class="container">
            <h1>{{ page.title }}</h1>
            {{ content }}
        </div>
    </main>
    
    {% include footer.html %}
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="{{ '/assets/js/firebase-auth.js' | relative_url }}" defer></script>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>



</body>
</html>
